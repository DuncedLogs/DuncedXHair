name: Package Addon

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create addon zip
        run: zip -r DuncedXHair.zip DuncedXHair

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuncedXHair
          path: DuncedXHair.zip

      - name: Attach zip to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DuncedXHair.zip
